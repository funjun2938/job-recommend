let current = 0;

async function render(idx) {
  current = idx;
  document.querySelectorAll('.domain-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.getElementById('domain-info').textContent = domains[idx].count;
  const container = document.getElementById('erd-container');
  container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--color-text-tertiary);font-size:13px;">렌더링 중...</div>';
  try {
    const id = 'erd-svg-' + idx + '-' + Date.now();
    const { svg } = await mermaid.render(id, domains[idx].diagram);
    container.innerHTML = svg;
    const svgEl = container.querySelector('svg');
    if (svgEl) svgEl.style.maxWidth = '100%';

    container.querySelectorAll('svg .node').forEach(node => {
      const firstPath = node.querySelector('path[d]');
      if (!firstPath) return;
      const d = firstPath.getAttribute('d');
      const nums = d.match(/-?[\d.]+/g)?.map(Number);
      if (!nums || nums.length < 8) return;
      const xs = [nums[0], nums[2], nums[4], nums[6]];
      const ys = [nums[1], nums[3], nums[5], nums[7]];
      const x = Math.min(...xs), y = Math.min(...ys);
      const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
      const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x', x); rect.setAttribute('y', y);
      rect.setAttribute('width', w); rect.setAttribute('height', h);
      rect.setAttribute('rx', '8');
      for (const a of ['fill','stroke','stroke-width','class','style']) {
        if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
      }
      firstPath.replaceWith(rect);
    });
    container.querySelectorAll('svg .row-rect-odd path, svg .row-rect-even path').forEach(p => {
      p.setAttribute('stroke','none');
    });
  } catch(e) {
    container.innerHTML = '<div style="padding:20px;color:var(--color-text-danger);font-size:13px;">오류: ' + e.message + '</div>';
  }
}

  btn.textContent = d.name;
  btn.onclick = () => render(i);
  tabsEl.appendChild(btn);
});

render(0);
</script>
